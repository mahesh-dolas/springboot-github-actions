name: Spring Boot CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Maven Project
        run: mvn clean verify

      - name: Get Maven Version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Application Version: $VERSION"

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "ERROR: DOCKER_USERNAME secret is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "ERROR: DOCKER_PASSWORD secret is missing"
            exit 1
          fi

          echo "Docker secrets found."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ env.VERSION }} \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ env.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest

      - name: Show Published Images
        run: |
          echo "Published Images:"
          echo "${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ env.VERSION }}"
          echo "${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest"