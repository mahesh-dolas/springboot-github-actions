name: Spring Boot CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Get Project Version
        id: version
        run: |
          VERSION=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q \
            -DforceStdout)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Docker Secrets
        run: |
          test -n "${{ secrets.DOCKER_USERNAME }}" || (echo "DOCKER_USERNAME is missing" && exit 1)
          test -n "${{ secrets.DOCKER_PASSWORD }}" || (echo "DOCKER_PASSWORD is missing" && exit 1)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ steps.version.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest \
            .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ steps.version.outputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest

      - name: Display Published Images
        run: |
          echo "Published Images:"
          echo "${{ secrets.DOCKER_USERNAME }}/springboot-poc:${{ steps.version.outputs.version }}"
          echo "${{ secrets.DOCKER_USERNAME }}/springboot-poc:latest"